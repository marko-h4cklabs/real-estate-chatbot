<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edenvile — Chat Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a3a5c;
      --navy-dark: #122845;
      --navy-mid: #234b75;
      --gold: #c8a96e;
      --gold-light: #dbbf8a;
      --gold-pale: #f5eddc;
      --bg: #f4f6f9;
      --white: #ffffff;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --bubble-bot: #f0f2f5;
      --radius: 16px;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ─────────────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 420px 1fr;
      min-height: 100vh;
    }

    /* ── Hero panel ─────────────────────────────────────────── */
    .hero {
      background: var(--navy);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px 40px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,169,110,.12) 0%, transparent 70%);
      top: -120px;
      left: -120px;
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,169,110,.08) 0%, transparent 70%);
      bottom: -80px;
      right: -80px;
      pointer-events: none;
    }

    .hero-top { position: relative; z-index: 1; }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 56px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: var(--gold);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 22px; height: 22px; fill: var(--navy); }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -.3px;
    }

    .hero-tagline {
      font-size: 13px;
      font-weight: 500;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 2.5px;
      margin-bottom: 16px;
    }

    .hero-headline {
      font-size: 38px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -.5px;
      margin-bottom: 20px;
    }

    .hero-headline em {
      font-style: normal;
      color: var(--gold);
    }

    .hero-desc {
      font-size: 15px;
      font-weight: 400;
      color: rgba(255,255,255,.6);
      line-height: 1.65;
      max-width: 320px;
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      position: relative;
      z-index: 1;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,.1);
    }

    .stat-value {
      font-size: 26px;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255,255,255,.45);
      font-weight: 400;
      letter-spacing: .3px;
    }

    /* ── Chat panel ─────────────────────────────────────────── */
    .chat-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background: var(--bg);
    }

    .chat-card {
      width: 100%;
      max-width: 560px;
      height: min(700px, calc(100vh - 64px));
      background: var(--white);
      border-radius: 24px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,.04), 0 20px 60px -10px rgba(26,58,92,.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Chat header ─────────────────────────────────────────── */
    .chat-header {
      background: var(--navy);
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .chat-avatar {
      width: 40px;
      height: 40px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .chat-avatar svg { width: 22px; height: 22px; fill: var(--navy); }

    .chat-header-info { flex: 1; }

    .chat-header-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--white);
      line-height: 1.2;
    }

    .chat-header-status {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    .status-text {
      font-size: 12px;
      color: rgba(255,255,255,.55);
      font-weight: 400;
    }

    .chat-header-badge {
      background: rgba(200,169,110,.18);
      border: 1px solid rgba(200,169,110,.35);
      color: var(--gold-light);
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: .3px;
    }

    /* ── Messages ────────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-bottom: 2px;
    }

    .msg-icon svg { width: 15px; height: 15px; fill: var(--gold); }

    .msg-bubble {
      max-width: 76%;
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 14.5px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .msg-bubble.bot {
      background: var(--bubble-bot);
      color: var(--text);
      border-bottom-left-radius: 5px;
    }

    .msg-bubble.user {
      background: var(--navy);
      color: var(--white);
      border-bottom-right-radius: 5px;
    }

    /* ── Suggestion chips ────────────────────────────────────── */
    .chips-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 0 0 4px;
    }

    .chip {
      background: var(--white);
      border: 1.5px solid var(--gold);
      color: var(--navy);
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      font-weight: 500;
      padding: 6px 13px;
      border-radius: 22px;
      cursor: pointer;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }

    .chip:hover {
      background: var(--gold);
      color: var(--white);
    }

    /* ── Typing indicator ────────────────────────────────────── */
    #typing {
      display: none;
      align-items: center;
      gap: 5px;
      padding: 11px 15px;
      background: var(--bubble-bot);
      border-radius: 18px;
      border-bottom-left-radius: 5px;
      width: fit-content;
    }

    #typing.visible { display: flex; }

    #typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite;
    }

    #typing span:nth-child(2) { animation-delay: .18s; }
    #typing span:nth-child(3) { animation-delay: .36s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .5; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input area ──────────────────────────────────────────── */
    .chat-footer {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      background: var(--white);
      flex-shrink: 0;
    }

    #chat-input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 11px 18px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .2s;
      resize: none;
    }

    #chat-input::placeholder { color: var(--text-muted); }
    #chat-input:focus { border-color: var(--navy); background: var(--white); }

    #send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--navy);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
    }

    #send-btn:hover { background: var(--navy-mid); }
    #send-btn:active { transform: scale(.94); }
    #send-btn svg { width: 18px; height: 18px; fill: var(--white); }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .hero {
        padding: 32px 28px;
        min-height: unset;
      }

      .hero-headline { font-size: 28px; }
      .hero::before, .hero::after { display: none; }

      .hero-stats { padding-top: 28px; gap: 24px; }

      .chat-panel { padding: 20px 16px; }

      .chat-card { height: min(600px, calc(100vh - 40px)); }
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- ── Hero ──────────────────────────────────────────── -->
  <aside class="hero">
    <div class="hero-top">
      <div class="logo-mark">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </div>
        <span class="logo-text">Edenvile</span>
      </div>

      <p class="hero-tagline">Nekretnine Zagreb</p>
      <h1 class="hero-headline">Pronađite<br/>savršenu<br/><em>nekretninu</em></h1>
      <p class="hero-desc">Vaš pouzdani partner u kupnji, prodaji i najmu nekretnina u Zagrebu i cijeloj Hrvatskoj. Pitajte nas bilo što.</p>
    </div>

    <div class="hero-stats">
      <div>
        <div class="stat-value">0–24h</div>
        <div class="stat-label">Dostupnost</div>
      </div>
      <div>
        <div class="stat-value">2,5%</div>
        <div class="stat-label">Provizija kupca</div>
      </div>
      <div>
        <div class="stat-value">Zagreb</div>
        <div class="stat-label">Fokus</div>
      </div>
    </div>
  </aside>

  <!-- ── Chat ──────────────────────────────────────────── -->
  <main class="chat-panel">
    <div class="chat-card">

      <header class="chat-header">
        <div class="chat-avatar">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        </div>
        <div class="chat-header-info">
          <div class="chat-header-name">Edenvile Asistent</div>
          <div class="chat-header-status">
            <div class="status-dot"></div>
            <span class="status-text">Dostupan odmah</span>
          </div>
        </div>
        <div class="chat-header-badge">AI Asistent</div>
      </header>

      <div id="messages"></div>

      <footer class="chat-footer">
        <input id="chat-input" type="text" placeholder="Napišite pitanje…" autocomplete="off" />
        <button id="send-btn" aria-label="Pošalji">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </footer>

    </div>
  </main>

</div>

<script>
  const PROXY_URL = '';
  const SUGGESTIONS = [
    'Kolika je provizija?',
    'Kako zakazati razgledavanje?',
    'Radite li po cijeloj Hrvatskoj?',
    'Kako prodati nekretninu?',
  ];
  const WELCOME = 'Dobar dan! Ja sam Edenvile asistent. Kako vam mogu pomoći danas?';

  let history = [];
  const msgBox = document.getElementById('messages');
  const input = document.getElementById('chat-input');

  // ── Helpers ──────────────────────────────────────────────────
  function scrollBottom() {
    msgBox.scrollTop = msgBox.scrollHeight;
  }

  function addBubble(text, role) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;

    if (role === 'bot') {
      const icon = document.createElement('div');
      icon.className = 'msg-icon';
      icon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>';
      row.appendChild(icon);
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble ' + role;
    bubble.textContent = text;
    row.appendChild(bubble);

    msgBox.appendChild(row);
    scrollBottom();
    return row;
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot';

    const icon = document.createElement('div');
    icon.className = 'msg-icon';
    icon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>';
    row.appendChild(icon);

    const t = document.createElement('div');
    t.id = 'typing';
    t.className = 'visible';
    t.innerHTML = '<span></span><span></span><span></span>';
    row.appendChild(t);

    msgBox.appendChild(row);
    scrollBottom();
    return row;
  }

  function addChips() {
    const row = document.createElement('div');
    row.className = 'chips-row';
    SUGGESTIONS.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = s;
      btn.onclick = () => { row.remove(); send(s); };
      row.appendChild(btn);
    });
    msgBox.appendChild(row);
    scrollBottom();
  }

  // ── Send ─────────────────────────────────────────────────────
  async function send(text) {
    text = (text || input.value).trim();
    if (!text) return;
    input.value = '';

    addBubble(text, 'user');
    history.push({ role: 'user', content: text });

    const typingRow = addTyping();

    try {
      const res = await fetch(PROXY_URL + '/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });
      const data = await res.json();
      typingRow.remove();
      const reply = data.reply || 'Ispričavam se, došlo je do greške.';
      addBubble(reply, 'bot');
      history.push({ role: 'assistant', content: reply });
      if (history.length > 20) history = history.slice(-20);
    } catch {
      typingRow.remove();
      addBubble('Nije moguće uspostaviti vezu s poslužiteljem. Provjerite je li server pokrenut.', 'bot');
    }
  }

  // ── Events ───────────────────────────────────────────────────
  document.getElementById('send-btn').addEventListener('click', () => send());
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  // ── Init ─────────────────────────────────────────────────────
  addBubble(WELCOME, 'bot');
  addChips();
</script>

</body>
</html>
