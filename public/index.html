<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EdenVille — Widget Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #f0f2f6;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .test-card {
      text-align: center;
      padding: 48px 40px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 32px rgba(26,58,92,.1);
      max-width: 480px;
      width: 90%;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: #1a3a5c;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 22px; height: 22px; fill: #c8a96e; }
    .logo-text { font-size: 20px; font-weight: 700; color: #1a3a5c; }
    h1 { font-size: 22px; font-weight: 600; color: #1a1a2e; margin-bottom: 10px; }
    p { font-size: 14px; color: #6b7280; line-height: 1.6; }
    .hint {
      margin-top: 28px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f8f9fc;
      border: 1px solid #e8eaf0;
      border-radius: 22px;
      padding: 8px 16px;
      font-size: 13px;
      color: #1a3a5c;
      font-weight: 500;
    }
    .hint-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #c8a96e;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .5; transform: scale(.85); }
    }
  </style>
</head>
<body>

  <div class="test-card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </div>
      <span class="logo-text">EdenVille</span>
    </div>
    <h1>Widget Test Stranica</h1>
    <p>Kliknite ikonu u donjem desnom kutu kako biste otvorili chat widget i testirali razgovorni tijek.</p>
    <div class="hint">
      <div class="hint-dot"></div>
      Matija je online
    </div>
  </div>

  <script src="/widget-embed.js"></script>
</body>
</html>
